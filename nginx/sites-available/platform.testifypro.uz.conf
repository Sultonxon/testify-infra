server {
    listen 80;
    server_name platform.testifypro.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name platform.testifypro.uz;

    include /etc/nginx/snippets/ssl-params.conf;

    # Platform backend API — frontend baseURL is https://platform.testifypro.uz/api/v1
    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/conf.d/proxy-params.conf;
    }
}
